<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Học Từ Vựng SRS</title>
  <style>
    :root {
      --bg: #f6f1e7;
      --paper: rgba(255, 252, 246, 0.96);
      --ink: #1f1d1a;
      --muted: #6f675c;
      --line: #ddd1bf;
      --accent: #0f6d62;
      --accent-soft: rgba(15, 109, 98, 0.11);
      --orange: #c96a2d;
      --orange-soft: rgba(201, 106, 45, 0.12);
      --ok: #1f7a4e;
      --warn: #b4492a;
      --neutral: #6f6657;
      --shadow: 0 16px 38px rgba(67, 48, 18, 0.10);
      --radius: 20px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
    }

    body {
      overflow: hidden;
      font-family: "Segoe UI", "Helvetica Neue", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(201, 106, 45, 0.10), transparent 30%),
        radial-gradient(circle at top right, rgba(15, 109, 98, 0.11), transparent 25%),
        linear-gradient(180deg, #fbf8f2 0%, #f2ebe0 100%);
    }

    .page {
      max-width: 1180px;
      height: 100vh;
      margin: 0 auto;
      padding: 14px 16px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow: hidden;
    }

    .hero {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      flex-wrap: wrap;
      flex: 0 0 auto;
    }

    .hero-copy h1 {
      margin: 0 0 6px;
      font-size: clamp(24px, 3vw, 38px);
      line-height: 1.02;
      letter-spacing: -0.03em;
    }

    .hero-copy p {
      margin: 0;
      max-width: 760px;
      font-size: 14px;
      line-height: 1.55;
      color: var(--muted);
    }

    .toolbar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .picker {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255, 253, 248, 0.96);
      border: 1px solid var(--line);
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .picker select {
      border: 0;
      background: transparent;
      color: var(--ink);
      font-weight: 700;
      font-size: 14px;
      outline: none;
      min-width: 180px;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 11px 16px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.14s ease, opacity 0.14s ease;
      box-shadow: var(--shadow);
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
    }

    .btn-primary {
      background: var(--accent);
      color: white;
    }

    .btn-secondary {
      background: white;
      color: var(--ink);
      border: 1px solid var(--line);
      box-shadow: none;
    }

    .btn-danger {
      background: #903333;
      color: white;
    }

    .btn-ok {
      background: var(--ok);
      color: white;
    }

    .btn-neutral {
      background: #efe5d6;
      color: #51463a;
    }

    .btn-warn {
      background: var(--warn);
      color: white;
    }

    .grid {
      flex: 1 1 auto;
      min-height: 0;
      display: grid;
      grid-template-columns: 300px minmax(0, 1fr);
      gap: 14px;
      overflow: hidden;
    }

    .panel,
    .card {
      min-height: 0;
      height: 100%;
      background: var(--paper);
      border: 1px solid rgba(221, 209, 191, 0.96);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
      overflow: hidden;
    }

    .panel {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .panel h2,
    .card h2 {
      margin: 0;
      font-size: 17px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .stat-box {
      background: #fbf6ee;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 10px 12px;
    }

    .stat-label {
      margin-bottom: 6px;
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .stat-value {
      font-size: 24px;
      font-weight: 800;
      line-height: 1;
    }

    .progress-line,
    .footer-note {
      font-size: 13px;
      line-height: 1.55;
      color: var(--muted);
    }

    .card {
      position: relative;
      padding: 16px;
      display: flex;
      flex-direction: column;
    }

    #studyArea {
      flex: 1 1 auto;
      min-height: 0;
      overflow: hidden;
    }

    .study-shell {
      display: flex;
      flex-direction: column;
      gap: 12px;
      height: 100%;
      min-height: 0;
    }

    .meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      flex: 0 0 auto;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 7px 11px;
      font-size: 12px;
      font-weight: 700;
      background: #f0e8db;
      color: #574d3f;
    }

    .chip.accent {
      background: var(--accent-soft);
      color: var(--accent);
    }

    .chip.warn {
      background: var(--orange-soft);
      color: var(--orange);
    }

    .content-grid {
      flex: 1 1 auto;
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(0, 1.05fr) minmax(320px, 0.95fr);
      gap: 12px;
      overflow: hidden;
    }

    .question-pane,
    .details-pane {
      min-height: 0;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: #fcf8f1;
      padding: 14px;
      overflow: hidden;
    }

    .question-pane {
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      gap: 12px;
      overflow: auto;
      padding-right: 10px;
    }

    .question-header {
      display: grid;
      gap: 8px;
    }

    .eyebrow {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      font-weight: 700;
    }

    .card-title {
      margin: 0;
      font-size: clamp(24px, 3vw, 34px);
      line-height: 1.05;
      letter-spacing: -0.03em;
      word-break: break-word;
    }

    .card-subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    .prompt-box {
      padding: 14px;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(15, 109, 98, 0.10), rgba(15, 109, 98, 0.03));
      font-size: 18px;
      line-height: 1.5;
      font-weight: 700;
      color: #184941;
    }

    .answer-block {
      display: grid;
      gap: 10px;
      flex: 0 0 auto;
    }

    .answer-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    input[type="text"] {
      flex: 1 1 260px;
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px 15px;
      font-size: 16px;
      background: #fffdfa;
      outline: none;
    }

    input[type="text"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(15, 109, 98, 0.10);
    }

    .choice-row {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .details-pane {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .details-scroll {
      flex: 1 1 auto;
      min-height: 0;
      overflow: auto;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      padding-right: 4px;
    }

    .detail-row {
      padding: 11px 12px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: #fffdf9;
      line-height: 1.55;
      font-size: 14px;
      overflow: hidden;
      word-break: break-word;
    }

    .detail-row.span-2 {
      grid-column: 1 / -1;
    }

    .detail-label {
      display: block;
      margin-bottom: 4px;
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .details-empty {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    .inline-result {
      display: none;
      margin-top: 2px;
      padding: 16px;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: rgba(255, 251, 245, 0.98);
      box-shadow: 0 10px 28px rgba(40, 28, 11, 0.10);
      overflow: auto;
    }

    .inline-result.show {
      display: block;
    }

    .inline-result.correct {
      border-color: rgba(31, 122, 78, 0.35);
      background: rgba(245, 255, 250, 0.98);
    }

    .inline-result.wrong {
      border-color: rgba(180, 73, 42, 0.35);
      background: rgba(255, 247, 243, 0.98);
    }

    .inline-result.neutral {
      border-color: rgba(111, 102, 87, 0.35);
      background: rgba(252, 248, 241, 0.98);
    }

    .inline-result h3 {
      margin: 0 0 8px;
      font-size: 22px;
    }

    .inline-result p {
      margin: 0 0 8px;
      line-height: 1.65;
      font-size: 14px;
    }

    .result-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 10px;
    }

    .countdown {
      margin-top: 12px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .empty {
      height: 100%;
      display: grid;
      place-items: center;
      text-align: center;
      color: var(--muted);
      line-height: 1.7;
      padding: 24px;
      border: 1px dashed var(--line);
      border-radius: 18px;
      background: #fbf6ee;
    }

    @media (max-width: 980px) {
      body {
        overflow: auto;
      }

      .page {
        height: auto;
        min-height: 100vh;
        overflow: visible;
      }

      .grid {
        grid-template-columns: 1fr;
        overflow: visible;
      }

      .panel,
      .card {
        height: auto;
      }

      .content-grid {
        grid-template-columns: 1fr;
      }

      .details-scroll,
      .result-grid {
        grid-template-columns: 1fr;
      }

      .choice-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <div class="hero">
      <div class="hero-copy">
        <h1>SRS Vocabulary Studio</h1>
        <p>
          Giao diện học gói trong một khung màn hình, có lượt làm quen từ mới, chấm tự động cho Việt -&gt; Anh,
          và tự chuyển sang câu kế tiếp sau khi hiển thị phản hồi.
        </p>
      </div>
      <div class="toolbar">
        <label class="picker">
          <span>Bộ từ vựng</span>
          <select id="vocabSetSelect"></select>
        </label>
        <button class="btn-secondary" id="reloadBtn">Tải lại</button>
        <button class="btn-danger" id="resetBtn">Reset tiến độ</button>
      </div>
    </div>

    <div class="grid">
      <aside class="panel">
        <h2>Tiến độ hiện tại</h2>
        <div class="stats-grid" id="statsGrid"></div>
        <div class="progress-line" id="progressLine">Đang tải...</div>
        <div class="footer-note" id="sessionMeta"></div>
      </aside>

      <main class="card">
        <div id="studyArea"></div>
      </main>
    </div>
  </div>

  <script>
    const API_BASE = window.location.protocol === "file:" ? "http://127.0.0.1:8000" : "";

    const state = {
      currentCard: null,
      latestProgress: null,
      totalWords: null,
      turn: 0,
      nextTimer: null,
      isSubmitting: false,
      keyboardChoiceEnabled: false,
      selectedVocab: null,
      vocabSets: [],
    };

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function clearNextTimer() {
      if (state.nextTimer) {
        window.clearTimeout(state.nextTimer);
        state.nextTimer = null;
      }
    }

    async function apiFetch(path, options = {}) {
      const response = await fetch(`${API_BASE}${path}`, options);
      const text = await response.text();
      let data = {};
      if (text) {
        try {
          data = JSON.parse(text);
        } catch {
          throw new Error(text.slice(0, 200) || `API trả về dữ liệu không hợp lệ (${response.status})`);
        }
      }
      if (!response.ok) {
        throw new Error(data.detail || `Lỗi API ${response.status}`);
      }
      return data;
    }


    function renderVocabPicker() {
      const select = document.getElementById("vocabSetSelect");
      if (!select) return;
      const previous = select.value;
      select.innerHTML = state.vocabSets.map((name) => `
        <option value="${escapeHtml(name)}">${escapeHtml(name)}</option>
      `).join("");
      select.value = state.selectedVocab || previous || state.vocabSets[0] || "";
    }

    async function refreshVocabSets() {
      const data = await apiFetch("/api/vocab-sets");
      state.selectedVocab = data.selected;
      state.vocabSets = data.sets || [];
      renderVocabPicker();
    }

    function renderProgress(progress, turn = null, totalWords = null) {
      if (!progress) return;
      state.latestProgress = progress;
      const stats = [
        ["B1", progress.b1],
        ["B2", progress.b2],
        ["B3", progress.b3],
        ["B4", progress.b4],
        ["B5", progress.b5],
        ["Chưa mở", progress.pending],
      ];
      document.getElementById("statsGrid").innerHTML = stats.map(([label, value]) => `
        <div class="stat-box">
          <div class="stat-label">${escapeHtml(label)}</div>
          <div class="stat-value">${escapeHtml(value)}</div>
        </div>
      `).join("");
      document.getElementById("progressLine").textContent = progress.line;
      document.getElementById("sessionMeta").textContent = turn === null
        ? ""
        : `Tổng lượt đã học: ${turn} | Tổng số từ: ${totalWords}`;
    }

    function hideResult() {
      clearNextTimer();
      const box = document.getElementById("inlineResultBox");
      if (!box) return;
      box.className = "inline-result";
      box.innerHTML = "";
    }


    function setAnswerControlsDisabled(disabled) {
      document.querySelectorAll("#answerInput, #submitAnswerBtn, [data-choice]").forEach((element) => {
        element.disabled = disabled;
      });
    }

    function showEmpty(message) {
      document.getElementById("studyArea").innerHTML = `<div class="empty">${escapeHtml(message)}</div>`;
      hideResult();
    }

    function buildDetails(card, revealAll = false) {
      const rows = [];
      state.keyboardChoiceEnabled = card.mode === "en_to_vi";
      const showFull = revealAll || card.mode === "intro";

      if (showFull && card.word) {
        rows.push(`<div class="detail-row"><span class="detail-label">Từ đúng</span>${escapeHtml(card.word)}</div>`);
      }
      if (showFull && card.meaning_vi) {
        rows.push(`<div class="detail-row"><span class="detail-label">Nghĩa Việt</span>${escapeHtml(card.meaning_vi)}</div>`);
      }
      if (showFull && card.meaning_en) {
        rows.push(`<div class="detail-row"><span class="detail-label">Nghĩa Anh</span>${escapeHtml(card.meaning_en)}</div>`);
      }
      if (card.pos) rows.push(`<div class="detail-row"><span class="detail-label">Từ loại</span>${escapeHtml(card.pos)}</div>`);
      if (card.phonetic) rows.push(`<div class="detail-row"><span class="detail-label">Phiên âm</span>${escapeHtml(card.phonetic)}</div>`);
      (card.examples || []).forEach((item, idx) => {
        rows.push(`<div class="detail-row span-2"><span class="detail-label">Ví dụ ${idx + 1}</span>${escapeHtml(item)}</div>`);
      });
      if (card.notes) rows.push(`<div class="detail-row span-2"><span class="detail-label">Ghi chú</span>${escapeHtml(card.notes)}</div>`);
      return rows.length ? rows.join("") : `<div class="details-empty">Không có thông tin bổ sung cho thẻ này.</div>`;
    }

    function renderCard(card) {
      state.currentCard = card;
      hideResult();
      renderProgress(card.progress, state.turn, state.totalWords);

      const meta = `
        <div class="meta-row">
          <span class="chip accent">${escapeHtml(card.mode_label)}</span>
          <span class="chip">Bậc ${escapeHtml(card.level)}</span>
          <span class="chip warn">Lần ${escapeHtml(card.appearance)}</span>
          <span class="chip">Lượt ${escapeHtml(card.upcoming_turn)}</span>
        </div>
      `;

      let leftPane = "";
      if (card.mode === "intro") {
        leftPane = `
          <div class="question-header">
            <span class="eyebrow">Học từ mới</span>
            <h2 class="card-title">${escapeHtml(card.word)}</h2>
            <p class="card-subtitle">Lượt đầu tiên là lượt làm quen. Bạn được nhìn từ, nghĩa, ví dụ rồi nhập lại từ tiếng Anh.</p>
            <div class="prompt-box">${escapeHtml(card.word)} = ${escapeHtml(card.meaning_vi || "")}</div>
          </div>
          <div class="answer-block">
            <div class="answer-row">
              <input id="answerInput" type="text" placeholder="${escapeHtml(card.input_placeholder)}" autocomplete="off" />
              <button class="btn-primary" id="submitAnswerBtn">Xác nhận</button>
            </div>
          </div>
        `;
      } else if (card.mode === "vi_to_en") {
        leftPane = `
          <div class="question-header">
            <span class="eyebrow">Gợi ý tiếng Việt</span>
            <h2 class="card-title">${escapeHtml(card.prompt_vi)}</h2>
            <p class="card-subtitle">Tự nhớ từ tiếng Anh rồi nhập đáp án. Hệ thống sẽ tự chấm và cập nhật bậc.</p>
            <div class="prompt-box">${escapeHtml(card.prompt_vi)}</div>
          </div>
          <div class="answer-block">
            <div class="answer-row">
              <input id="answerInput" type="text" placeholder="${escapeHtml(card.input_placeholder)}" autocomplete="off" />
              <button class="btn-primary" id="submitAnswerBtn">Kiểm tra</button>
            </div>
          </div>
        `;
      } else {
        leftPane = `
          <div class="question-header">
            <span class="eyebrow">Từ tiếng Anh</span>
            <h2 class="card-title">${escapeHtml(card.word)}</h2>
            <p class="card-subtitle">Tự nhớ nghĩa tiếng Việt rồi tự đánh giá mức độ nhớ để cập nhật bậc.</p>
            <div class="prompt-box">${escapeHtml(card.word)}</div>
          </div>
          <div class="answer-block">
            <div class="choice-row">
              <button class="btn-warn" data-choice="down">← Xuống 1 bậc</button>
              <button class="btn-neutral" data-choice="keep">Enter · Giữ nguyên</button>
              <button class="btn-ok" data-choice="up">Lên 1 bậc →</button>
            </div>
            <p class="card-subtitle">Phím tắt: ← hoặc ↓ để xuống bậc, Enter để giữ nguyên, → hoặc ↑ để lên bậc.</p>
          </div>
        `;
      }

      document.getElementById("studyArea").innerHTML = `
        <div class="study-shell">
          ${meta}
          <div class="content-grid">
            <section class="question-pane">
              ${leftPane}
              <div class="inline-result" id="inlineResultBox"></div>
            </section>
            <aside class="details-pane">
              <span class="eyebrow">Thông tin hỗ trợ</span>
              <div class="details-scroll" id="detailsScroll">
                ${buildDetails(card)}
              </div>
            </aside>
          </div>
        </div>
      `;

      const input = document.getElementById("answerInput");
      if (input) {
        input.focus();
        input.addEventListener("keydown", (event) => {
          if (event.key === "Enter") submitTextAnswer();
        });
      }

      const submitBtn = document.getElementById("submitAnswerBtn");
      if (submitBtn) submitBtn.addEventListener("click", submitTextAnswer);

      document.querySelectorAll("[data-choice]").forEach((button) => {
        button.addEventListener("click", () => submitChoice(button.dataset.choice));
      });

      setAnswerControlsDisabled(false);
    }

    async function loadCard() {
      clearNextTimer();
      state.isSubmitting = false;
      const data = await apiFetch("/api/card");
      state.turn = data.session.turn;
      state.totalWords = data.session.total_words;
      state.selectedVocab = data.session.selected_vocab || state.selectedVocab;
      renderVocabPicker();
      if (data.done) {
        state.keyboardChoiceEnabled = false;
        renderProgress(data.session.progress, data.session.turn, data.session.total_words);
        showEmpty(data.message || "Hiện tại chưa có thẻ nào để học.");
        return;
      }
      renderCard(data.card);
    }

    async function submitTextAnswer() {
      const input = document.getElementById("answerInput");
      if (!input || !state.currentCard || state.isSubmitting) return;
      await submitAnswer({ token: state.currentCard.token, answer: input.value });
    }

    async function submitChoice(choice) {
      if (!state.currentCard || state.isSubmitting) return;
      await submitAnswer({ token: state.currentCard.token, choice });
    }

    async function submitAnswer(payload) {
      if (state.isSubmitting) return;
      state.isSubmitting = true;
      setAnswerControlsDisabled(true);
      try {
        const data = await apiFetch("/api/answer", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        state.turn = data.session.turn;
        state.totalWords = data.session.total_words;
        renderProgress(data.session.progress, data.session.turn, data.session.total_words);
        renderResult(data.result);
      } catch (error) {
        state.isSubmitting = false;
        setAnswerControlsDisabled(false);
        alert(error.message || "Không gửi được đáp án.");
        await loadCard();
      }
    }

    function renderResult(result) {
      hideResult();
      state.keyboardChoiceEnabled = false;
      state.isSubmitting = false;
      setAnswerControlsDisabled(true);
      const box = document.getElementById("inlineResultBox");
      if (!box) return;
      const detailsScroll = document.getElementById("detailsScroll");
      if (detailsScroll && state.currentCard) {
        detailsScroll.innerHTML = buildDetails(state.currentCard, true);
      }

      let title = result.status === "correct" ? "Đúng" : result.status === "wrong" ? "Sai" : "Giữ nguyên";
      if (result.mode === "en_to_vi") {
        if (result.new_level > result.old_level) {
          title = "Lên 1 bậc";
        } else if (result.new_level < result.old_level) {
          title = "Xuống 1 bậc";
        } else {
          title = "Giữ nguyên";
        }
      }

      box.className = `inline-result show ${result.status}`;
      box.innerHTML = `
        <h3>${escapeHtml(title)}</h3>
        <p><strong>Từ đúng:</strong> ${escapeHtml(result.correct_word)}</p>
        <button class="btn-primary" id="nextBtn">Space / Enter / → / ↑ · Câu tiếp theo</button>
      `;
      document.getElementById("nextBtn").addEventListener("click", () => {
        loadCard().catch((error) => {
          state.keyboardChoiceEnabled = false;
          showEmpty(error.message || "Không tải được câu tiếp theo.");
        });
      });
    }

    async function switchVocabSet(filename) {
      clearNextTimer();
      state.isSubmitting = false;
      try {
        const data = await apiFetch("/api/vocab-sets/select", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ filename }),
        });
        state.turn = data.session.turn;
        state.totalWords = data.session.total_words;
        state.selectedVocab = data.session.selected_vocab;
        state.vocabSets = data.vocab_sets.sets || state.vocabSets;
        renderVocabPicker();
        renderProgress(data.session.progress, data.session.turn, data.session.total_words);
        await loadCard();
      } catch (error) {
        alert(error.message || "Không chuyển được bộ từ vựng.");
        await refreshVocabSets();
      }
    }

    async function resetSession() {
      const ok = window.confirm("Bạn có chắc muốn reset toàn bộ tiến độ học không?");
      if (!ok) return;
      try {
        const data = await apiFetch("/api/reset", { method: "POST" });
        state.turn = data.session.turn;
        state.totalWords = data.session.total_words;
        state.selectedVocab = data.session.selected_vocab || state.selectedVocab;
        renderVocabPicker();
        renderProgress(data.session.progress, data.session.turn, data.session.total_words);
        await loadCard();
      } catch (error) {
        alert(error.message || "Không reset được tiến độ.");
      }
    }

    document.addEventListener("keydown", (event) => {
      const nextBtn = document.getElementById("nextBtn");
      if ((event.code === "Space" || event.key === "Enter" || event.key === "ArrowRight" || event.key === "ArrowUp") && nextBtn) {
        event.preventDefault();
        nextBtn.click();
        return;
      }
      if (!state.keyboardChoiceEnabled || !state.currentCard || state.currentCard.mode !== "en_to_vi" || state.isSubmitting) {
        return;
      }
      if (["ArrowLeft", "ArrowDown"].includes(event.key)) {
        event.preventDefault();
        submitChoice("down");
        return;
      }
      if (event.key === "Enter") {
        event.preventDefault();
        submitChoice("keep");
        return;
      }
      if (["ArrowRight", "ArrowUp"].includes(event.key)) {
        event.preventDefault();
        submitChoice("up");
      }
    });

    document.getElementById("vocabSetSelect").addEventListener("change", (event) => {
      const filename = event.target.value;
      if (!filename || filename === state.selectedVocab) return;
      switchVocabSet(filename);
    });

    document.getElementById("resetBtn").addEventListener("click", resetSession);
    document.getElementById("reloadBtn").addEventListener("click", () => {
      loadCard().catch((error) => showEmpty(error.message || "Không tải lại được dữ liệu."));
    });

    (async () => {
      try {
        await refreshVocabSets();
        await loadCard();
      } catch (error) {
        showEmpty(error.message || "Không tải được giao diện học.");
      }
    })();
  </script>
</body>

</html>
